<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque Inteligente</title>
    <!-- Bibliotecas Necessárias -->
    <script src="https://cloudflare.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { padding: 15px; max-width: 600px; margin: 0 auto; background: #f4f6f9; color: #333; }
        .box { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .hidden { display: none !important; }
        h2 { margin-top: 0; text-align: center; }
        input, select, button, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; outline: none; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; }
        .btn-pdf { background: #17a2b8; margin-top: 15px; }
        .btn-danger { background: #dc3545; width: auto; padding: 8px 15px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        .action-btns { display: flex; gap: 10px; }
        .action-btns button { padding: 8px 15px; width: auto; margin: 0; }
        .alert-row { background-color: #ffe6e6 !important; }
        .pix-box { text-align: center; border: 2px dashed #28a745; padding: 15px; border-radius: 8px; background: #f9fff9; }
        .link-toggle { text-align: center; margin-top: 15px; color: #007bff; cursor: pointer; }
        .suporte-box { background: #eef9ff; border: 1px solid #bce1ff; padding: 15px; border-radius: 8px; text-align: center; margin-top: 10px; }
        .btn-wpp { background: #25d366; color: white; text-decoration: none; display: block; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="tela-login" class="box" style="margin-top: 50px;">
        <h2>Acessar Sistema</h2>
        <input type="text" id="login-user" placeholder="Nome da sua Loja">
        <input type="password" id="login-senha" placeholder="Sua Senha">
        <button onclick="fazerLogin()">Entrar no Painel</button>
        <div class="link-toggle" onclick="mudarTela('tela-login', 'tela-cadastro')">Não tem conta? Cadastre-se Grátis!</div>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="tela-cadastro" class="box hidden" style="margin-top: 30px;">
        <h2>Criar Conta Grátis (7 dias)</h2>
        <input type="text" id="cad-user" placeholder="Nome da sua Loja">
        <input type="password" id="cad-senha" placeholder="Crie uma Senha">
        <select id="cad-plano">
            <option value="bronze">Plano Bronze - R$ 34,90/mês (Até 30 itens)</option>
            <option value="prata" selected>Plano Prata - R$ 59,90/mês (Até 150 itens)</option>
            <option value="ouro">Plano Ouro - R$ 99,90/mês (Itens Ilimitados)</option>
        </select>
        <button onclick="registrarLoja()" style="background: #28a745;">Ativar meu Teste Grátis 🚀</button>
        <div class="link-toggle" onclick="mudarTela('tela-cadastro', 'tela-login')">Já tenho conta? Fazer Login</div>
    </div>

    <!-- TELA DE BLOQUEIO / PIX -->
    <div id="tela-bloqueio" class="box hidden" style="margin-top: 50px;">
        <h2 style="color: #dc3545;">🚨 Acesso Encerrado!</h2>
        <p style="text-align: center;">O prazo venceu. Pague a assinatura para liberar:</p>
        <div class="pix-box">
            <p style="font-weight: bold; font-size: 18px;" id="txt-preco-plano">R$ 59,90</p>
            <div style="width: 120px; height: 120px; background: #ddd; margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 11px;">[ QR CODE ]</div>
            <button onclick="copiarPix()" style="background: #28a745; padding: 10px;">📋 Copiar Código Pix</button>
        </div>
        <div class="suporte-box">
            <a href="https://wa.me" target="_blank" class="btn-wpp">💬 Suporte no WhatsApp</a>
        </div>
        <button onclick="deslogar()" class="btn-pdf" style="background: #6c757d;">Voltar ao Login</button>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div id="tela-painel" class="box hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <span>Loja: <b id="nome-loja" style="color: #007bff; text-transform: uppercase;"></b></span>
            <button onclick="deslogar()" class="btn-danger">Sair</button>
        </div>
        <h2>📦 Mercadorias</h2>
        <p style="text-align: center; font-size: 14px; color: #666;" id="txt-limite-plano"></p>
        <input type="text" id="p-nome" placeholder="Nome do Produto">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="p-qtd" placeholder="Qtd">
            <input type="number" id="p-preco" step="0.01" placeholder="Preço R$">
        </div>
        <button onclick="adicionarProduto()" class="btn-add">Adicionar ao Estoque</button>
        <button onclick="baixarPDF()" class="btn-pdf">📄 Baixar Relatório PDF</button>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Item / Preço</th><th>Estoque</th><th>Ações</th></tr></thead>
                <tbody id="tabela-produtos"></tbody>
            </table>
        </div>
        <!-- AJUDA -->
        <div style="margin-top: 30px; border-top: 1px dashed #ccc; padding-top: 15px;">
            <textarea id="txt-sugestao" rows="2" placeholder="Envie uma sugestão de melhoria..."></textarea>
            <button onclick="enviarSugestao()" style="background: #6c757d; padding: 8px;">Enviar Sugestão</button>
            <div class="suporte-box"><a href="https://wa.me" target="_blank" class="btn-wpp">💬 Suporte Técnico</a></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8iSQDQ27vwtd0vOPSsi8AJ3rTykIu-1I",
            authDomain: "://firebaseapp.com",
            projectId: "meu-estoque-saas",
            storageBucket: "meu-estoque-saas.firebasestorage.app",
            messagingSenderId: "865191014496",
            appId: "1:865191014496:web:d12d8b3fca15912f941305"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let usuarioLogado = localStorage.getItem('userLogado') || '';
        const limitesPlanos = { "bronze": 30, "prata": 150, "ouro": 99999 };
        const precosPlanos = { "bronze": "R$ 34,90", "prata": "R$ 59,90", "ouro": "R$ 99,90" };

        function mudarTela(esconder, mostrar) {
            document.getElementById(esconder).classList.add('hidden');
            document.getElementById(mostrar).classList.remove('hidden');
        }

        async function checarStatus() {
            if (!usuarioLogado) { return mudarTela('tela-painel', 'tela-login'); }
            try {
                const docSnap = await db.collection("lojas").doc(usuarioLogado).get();
                if (docSnap.exists) {
                    const dados = docSnap.data();
                    const hoje = new Date().toISOString().split('T')[0];
                    if (hoje > dados.vencimento) {
                        document.getElementById('txt-preco-plano').innerText = precosPlanos[dados.plano];
                        mudarTela('tela-login', 'tela-bloqueio');
                        document.getElementById('tela-painel').classList.add('hidden');
                        return;
                    }
                    document.getElementById('tela-login').classList.add('hidden');
                    document.getElementById('tela-bloqueio').classList.add('hidden');
                    document.getElementById('tela-painel').classList.remove('hidden');
                    document.getElementById('nome-loja').innerText = usuarioLogado;
                    document.getElementById('txt-limite-plano').innerText = `Plano ${dados.plano.toUpperCase()} (Limite: ${dados.plano==='ouro'?'Ilimitado':limitesPlanos[dados.plano]+' itens'})`;
                    renderizarTabela(dados.produtos || []);
                } else { deslogar(); }
            } catch (e) { console.error(e); }
        }

        async function registrarLoja() {
            const user = document.getElementById('cad-user').value.toLowerCase().replace(/\s+/g, '').trim();
            const senha = document.getElementById('cad-senha').value;
            const plano = document.getElementById('cad-plano').value;
            if(!user || !senha) return alert("Preencha todos os campos!");
            try {
                const docSnap = await db.collection("lojas").doc(user).get();
                if (docSnap.exists) return alert("Nome de loja já usado!");
                const dataV = new Date(); dataV.setDate(dataV.getDate() + 7);
                await db.collection("lojas").doc(user).set({
                    senha: senha, plano: plano, vencimento: dataV.toISOString().split('T')[0], produtos: [], sugestoes: []
                });
                alert("Cadastro Realizado com Sucesso! 🎉\nVocê ganhou 7 dias gratuitos.");
                usuarioLogado = user; localStorage.setItem('userLogado', user); checarStatus();
            } catch (e) { alert("Erro ao cadastrar!"); }
        }

        async function fazerLogin() {
            const user = document.getElementById('login-user').value.toLowerCase().replace(/\s+/g, '').trim();
            const senha = document.getElementById('login-senha').value;
            if(!user || !senha) return alert("Preencha todos os campos!");
            try {
                const docSnap = await db.collection("lojas").doc(user).get();
                if (!docSnap.exists) return alert("Loja não encontrada!");
                const dados = docSnap.data();
                if (dados.senha !== senha) return alert("Senha incorreta!");
                usuarioLogado = user; localStorage.setItem('userLogado', user); checarStatus();
            } catch (e) { alert("Erro ao fazer login!"); }
        }

        function deslogar() { localStorage.removeItem('userLogado'); usuarioLogado = ''; mudarTela('tela-painel', 'tela-login'); }

        async function adicionarProduto() {
            const nome = document.getElementById('p-nome').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const preco = parseFloat(document.getElementById('p-preco').value);
            if(!nome || isNaN(qtd) || isNaN(preco)) return alert("Preencha todos os campos corretamente!");
            try {
                const docRef = db.collection("lojas").doc(usuarioLogado);
                const docSnap = await docRef.get();
                if (docSnap.exists) {
                    const dados = docSnap.data();
                    if (dados.produtos.length >= limitesPlanos[dados.plano]) return alert("Limite de produtos atingido para o seu plano!");
                    dados.produtos.push({ nome, qtd, preco });
                    await docRef.update({ produtos: dados.produtos });
                    renderizarTabela(dados.produtos);
                    document.getElementById('p-nome').value = '';
                    document.getElementById('p-qtd').value = '';
                    document.getElementById('p-preco').value = '';
                }
            } catch (e) { alert("Erro ao adicionar produto!"); }
        }

        function renderizarTabela(produtos) {
            const tbody = document.getElementById('tabela-produtos');
            tbody.innerHTML = '';
            produtos.forEach((p, index) => {
                const tr = document.createElement('tr');
                if (p.qtd < 5) tr.classList.add('alert-row');
                tr.innerHTML = `<td>${p.nome} - R$ ${p.preco.toFixed(2)}</td><td>${p.qtd}</td>
                    <td class="action-btns">
                        <button onclick="editarProduto(${index})" style="background: #ffc107;">Editar</button>
                        <button onclick="removerProduto(${index})" class="btn-danger">Remover</button>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        async function removerProduto(index) {
            if (!confirm("Deseja realmente remover este produto?")) return;
            try {
                const docRef = db.collection("lojas").doc(usuarioLogado);
                const docSnap = await docRef.get();
                if (docSnap.exists) {
                    const dados = docSnap.data();
                    dados.produtos.splice(index, 1);
                    await docRef.update({ produtos: dados.produtos });
                    renderizarTabela(dados.produtos);
                }
            } catch (e) { alert("Erro ao remover produto!"); }
        }

        async function editarProduto(index) {
            const novoNome = prompt("Novo nome do produto:");
            const novaQtd = parseInt(prompt("Nova quantidade:"));
            const novoPreco = parseFloat(prompt("Novo preço:"));
            if(!novoNome || isNaN(novaQtd) || isNaN(novoPreco)) return alert("Preencha todos os campos corretamente!");
            try {
                const docRef = db.collection("lojas").doc(usuarioLogado);
                const docSnap = await docRef.get();
                if (docSnap.exists) {
                    const dados = docSnap.data();
                    dados.produtos[index] = { nome: novoNome, qtd: novaQtd, preco: novoPreco };
                    await docRef.update({ produtos: dados.produtos });
                    renderizarTabela(dados.produtos);
                }
            } catch (e) { alert("Erro ao editar produto!"); }
        }

        async function enviarSugestao() {
            const sugestao = document.getElementById('txt-sugestao').value.trim();
            if(!sugestao) return alert("Digite uma sugestão!");
            try {
                const docRef = db.collection("lojas").doc(usuarioLogado);
                const docSnap = await docRef.get();
                if (docSnap.exists) {
                    const dados = docSnap.data();
                    dados.sugestoes.push({ texto: sugestao, data: new Date().toISOString() });
                    await docRef.update({ sugestoes: dados.sugestoes });
                    document.getElementById('txt-sugestao').value = '';
                    alert("Sugestão enviada! Obrigado pelo feedback.");
                }
            } catch (e) { alert("Erro ao enviar sugestão!"); }
        }
</script>
</body>
